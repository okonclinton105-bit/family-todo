<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family To-Do List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: none; 
        }
        
        #loginScreen {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        #loginScreen h2 { margin-bottom: 20px; color: #764ba2; }
        .login-btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            border: none; border-radius: 10px; font-size: 16px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .login-btn:hover { opacity: 0.8; }
        .login-btn.grandma { background: #bee3f8; color: #2c5282; }
        .login-btn.mmakamba { background: #fbb6ce; color: #97266d; }
        .login-btn.papaeka { background: #c6f6d5; color: #276749; }
        .login-btn.eteobong { background: #feebc8; color: #c05621; }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; text-align: center; position: relative;
        }
        .logout-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.2); border: 1px solid white;
            color: white; padding: 5px 10px; border-radius: 10px; cursor: pointer;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .input-section { padding: 25px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] {
            flex: 1; padding: 12px; border: 2px solid #e9ecef;
            border-radius: 10px; font-size: 16px;
        }
        .add-btn {
            background: #667eea; color: white; border: none; padding: 12px 24px;
            border-radius: 10px; cursor: pointer; font-size: 16px;
        }
        .todo-list { padding: 25px; max-height: 500px; overflow-y: auto; }
        .todo-item {
            display: flex; align-items: center; padding: 15px; margin-bottom: 10px;
            background: #f8f9fa; border-radius: 12px;
        }
        .todo-item.completed { opacity: 0.6; }
        .todo-item.completed .todo-text { text-decoration: line-through; }
        .checkbox {
            width: 24px; height: 24px; border: 3px solid #667eea;
            border-radius: 50%; margin-right: 15px; cursor: pointer;
        }
        .checkbox.checked { background: #667eea; }
        .todo-content { flex: 1; }
        .todo-text { font-size: 16px; margin-bottom: 5px; }
        .delete-btn {
            background: #fc8181; color: white; border: none;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
        }
        .assignee { padding: 2px 8px; border-radius: 10px; font-weight: 600; font-size: 12px;}
        .assignee.grandma { background: #bee3f8; color: #2c5282; }
        .assignee.mmakamba { background: #fbb6ce; color: #97266d; }
        .assignee.papaeka { background: #c6f6d5; color: #276749; }
        .assignee.eteobong { background: #feebc8; color: #c05621; }
        .empty-state { text-align: center; padding: 60px 20px; color: #718096; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>Who is logging in?</h2>
        <button class="login-btn grandma" onclick="login('Grandma')">Grandma</button>
        <button class="login-btn mmakamba" onclick="login('Aunty Mmakamba')">Aunty Mmakamba</button>
        <button class="login-btn papaeka" onclick="login('Papaeka')">Papaeka</button>
        <button class="login-btn eteobong" onclick="login('Eteobong')">Eteobong</button>
    </div>

    <div class="container" id="mainApp">
        <div class="header">
            <button class="logout-btn" onclick="logout()">Log Out</button>
            <h1>🏠 <span id="userGreeting"></span>'s Tasks</h1>
            <p>Your personal to-do list</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="What needs to be done?">
                <button class="add-btn" onclick="addTodo()">Add Task</button>
            </div>
        </div>

        <div class="todo-list" id="todoList">
            </div>
    </div>

    <script type="module">
        // 1. Import Firebase Tools
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // 2. Your Secret Keys
        const firebaseConfig = {
            apiKey: "AIzaSyBucbCx8Xl2frV5opf-TYbFDLQwrOhkhJg",
            authDomain: "family-todo-app-f3d48.firebaseapp.com",
            projectId: "family-todo-app-f3d48",
            storageBucket: "family-todo-app-f3d48.firebasestorage.app",
            messagingSenderId: "259750158614",
            appId: "1:259750158614:web:8cf220ff3c7a4091e87037"
        };

        // 3. Connect to Database
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. App Logic
        let todos = [];
        let currentUser = null;

        // Listen for real-time updates from Firebase
        onSnapshot(collection(db, "todos"), (snapshot) => {
            todos = [];
            snapshot.forEach((doc) => {
                todos.push({ id: doc.id, ...doc.data() });
            });
            // Sort so newest tasks are at the top
            todos.sort((a, b) => b.createdAt - a.createdAt); 
            if (currentUser) {
                renderTodos();
            }
        });

        // Make functions globally available for HTML buttons
        window.login = function(userName) {
            currentUser = userName;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userGreeting').textContent = userName;
            renderTodos();
        };

        window.logout = function() {
            currentUser = null;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        };

        window.addTodo = async function() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;

            // Save to Firebase Cloud!
            await addDoc(collection(db, "todos"), {
                text: text,
                completed: false,
                assignee: currentUser,
                createdAt: Date.now()
            });
            input.value = '';
        };

        window.toggleTodo = async function(id, currentStatus) {
            const taskRef = doc(db, "todos", id);
            await updateDoc(taskRef, {
                completed: !currentStatus
            });
        };

        window.deleteTodo = async function(id) {
            const taskRef = doc(db, "todos", id);
            await deleteDoc(taskRef);
        };

        function renderTodos() {
            const list = document.getElementById('todoList');
            let userTodos = todos.filter(t => t.assignee === currentUser);

            if (userTodos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks found</h3>
                        <p>Add a new task to get started!</p>
                    </div>`;
                return;
            }

            list.innerHTML = userTodos.map(todo => {
                let cssClass = todo.assignee.toLowerCase().replace(' ', '');
                if(cssClass === 'auntymmakamba') cssClass = 'mmakamba';

                return `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}', ${todo.completed})"></div>
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(todo.text)}</div>
                        <div class="todo-meta">
                            <span class="assignee ${cssClass}">${todo.assignee}</span>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteTodo('${todo.id}')">🗑️</button>
                </div>
            `}).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
